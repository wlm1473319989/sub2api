name: Deploy Docker

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment name used for deployment secrets and approvals'
        required: true
        default: production
        type: string
      image_tag:
        description: 'Image tag to deploy (use latest or a release tag like 1.2.3 / v1.2.3)'
        required: true
        default: latest
        type: string
      compose_file:
        description: 'Compose file on the server, relative to DEPLOY_PATH'
        required: true
        default: docker-compose.local.yml
        type: string
      wait_seconds:
        description: 'How long to wait for the sub2api container health check'
        required: true
        default: '180'
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COMPOSE_FILE: ${{ github.event.inputs.compose_file }}
          RAW_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          WAIT_SECONDS: ${{ github.event.inputs.wait_seconds }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || '22' }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: DEPLOY_PATH,COMPOSE_FILE,RAW_IMAGE_TAG,WAIT_SECONDS,REPOSITORY_OWNER,GHCR_USERNAME,GHCR_TOKEN
          command_timeout: 30m
          script: |
            set -e

            test -n "$DEPLOY_PATH"
            test -d "$DEPLOY_PATH"

            cd "$DEPLOY_PATH"
            test -f "$COMPOSE_FILE"

            IMAGE_TAG="${RAW_IMAGE_TAG#v}"
            REPOSITORY_OWNER_LOWER=$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${REPOSITORY_OWNER_LOWER}/sub2api:${IMAGE_TAG}"

            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            export IMAGE
            docker compose -f "$COMPOSE_FILE" pull
            docker compose -f "$COMPOSE_FILE" up -d

            end_time=$(( $(date +%s) + WAIT_SECONDS ))
            while true; do
              status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' sub2api 2>/dev/null || true)
              if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                break
              fi

              if [ "$(date +%s)" -ge "$end_time" ]; then
                echo "sub2api failed to become healthy, last status: ${status}"
                docker compose -f "$COMPOSE_FILE" ps
                docker compose -f "$COMPOSE_FILE" logs --tail 100 sub2api
                exit 1
              fi

              sleep 5
            done

            echo "Deployed image: $IMAGE"
            docker compose -f "$COMPOSE_FILE" ps
